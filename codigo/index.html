    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:   #081D4D;
      --gray:   #707379;
      --silver: #A7A9B4;
      --white:  #F2F3F7;
      --accent: #C8D4F0;
      --border: rgba(167,169,180,0.15);
    }
    html { scroll-behavior: auto; }
    body {
      background: var(--navy);
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      cursor: none;
    }
 
    /* ── CURSOR (solo desktop) ── */
    #cur, #curR { display: none; }
    @media (hover: hover) {
      #cur  { display:block; width:9px;height:9px;background:var(--accent);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;mix-blend-mode:difference; }
      #curR { display:block; width:30px;height:30px;border:1px solid var(--accent);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;opacity:0.4; }
    }
 
    /* ── WRAPPER SCROLL (mobile: 300vh para pin; desktop: 100vh) ── */
    #hero-wrap {
      height: 100vh;
    }
    @media (max-width: 768px) {
      #hero-wrap { height: 300vh; }
    }
 
    /* ── HERO ── */
    #hero {
      width: 100vw;
      height: 100vh;
      position: relative;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    @media (max-width: 768px) {
      #hero { position: sticky; top: 0; }
    }
 
    .h-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(167,169,180,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(167,169,180,0.05) 1px, transparent 1px);
      background-size: 55px 55px;
    }
    .h-blob {
      position: absolute; top: -20%; right: -15%;
      width: 65vw; height: 65vw; max-width: 620px;
      background: radial-gradient(ellipse at center, rgba(200,212,240,0.09) 0%, transparent 70%);
      border-radius: 50%;
      animation: blob 8s ease-in-out infinite;
    }
    @keyframes blob { 0%,100%{transform:scale(1);}50%{transform:scale(1.07);} }
 
    /* ── NOMBRE COMPLETO (fase 1) ── */
    #name-stage {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0.08em; z-index: 2;
      opacity: 0;
    }
    .nline {
      display: flex; align-items: baseline; justify-content: center;
      white-space: nowrap;
    }
    .nl {
      font-family: 'BigDeal', sans-serif;
      font-size: clamp(1.8rem, 4.8vw, 4.8rem);
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.04em;
      line-height: 1.05;
      display: inline-block;
    }
    .nl.ini { color: #ffffff; }
    /* espacio entre palabras */
    .nl.sp  { color: transparent; width: 0.28em; pointer-events: none; }
 
    /* ── LETRAS VOLANDO ── */
    .fly {
      position: absolute;
      font-family: 'BigDeal', sans-serif;
      line-height: 1;
      pointer-events: none;
      z-index: 10;
      opacity: 0;
    }
 
    /* ── POST-ANIMACIÓN (fase 4) ── */
    #hero-after {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding-bottom: 4rem;
      display: flex; flex-direction: column;
      align-items: center; gap: 0.65rem;
      z-index: 5;
      opacity: 0;
      transform: translateY(14px);
    }
    .h-eyebrow {
      font-size: 0.64rem; letter-spacing: 0.26em;
      text-transform: uppercase; color: var(--gray);
      display: flex; align-items: center; gap: 12px;
    }
    .h-eyebrow::before, .h-eyebrow::after {
      content:''; display:block; width:24px; height:1px; background:var(--gray);
    }
    .h-role {
      font-size: clamp(0.78rem, 1.4vw, 0.94rem);
      color: var(--silver); font-weight: 300;
      letter-spacing: 0.05em; text-align: center;
      padding: 0 1rem;
    }
    .h-cta { margin-top:0.35rem; display:flex; gap:0.85rem; flex-wrap:wrap; justify-content:center; }
    .btn {
      padding: 0.75rem 1.8rem;
      font-family: 'Outfit', sans-serif;
      font-size: 0.74rem; font-weight: 600;
      letter-spacing: 0.12em; text-transform: uppercase;
      text-decoration: none; border-radius: 3px;
      transition: all 0.22s; cursor: none; border: none;
    }
    .bp { background: var(--accent); color: var(--navy); }
    .bp:hover { background: var(--white); transform: translateY(-2px); }
    .bo { border:1.5px solid var(--border); color:var(--silver); background:transparent; }
    .bo:hover { border-color:var(--accent); color:var(--white); transform:translateY(-2px); }
 
    /* ── SCROLL HINT ── */
    #scroll-hint {
      position: absolute; bottom: 1.4rem; left: 50%;
      transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center;
      gap: 5px; z-index: 6; opacity: 0;
    }
    .s-line {
      width:1px; height:38px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      animation: sp 2s ease-in-out infinite;
    }
    @keyframes sp { 0%,100%{opacity:.3;transform:scaleY(1);}50%{opacity:1;transform:scaleY(1.12);} }
    .s-txt { font-size:.58rem; letter-spacing:.22em; text-transform:uppercase; color:var(--gray); }
  </style>
</head>
<body>
 
<div id="cur"></div>
<div id="curR"></div>
 
<div id="hero-wrap">
  <main id="hero" aria-label="Presentación José Antonio Cruz Segura">
    <div class="h-grid"></div>
    <div class="h-blob"></div>
 
    <div id="name-stage" aria-hidden="true">
      <div class="nline">
        <span class="nl ini" id="hJ">J</span><span class="nl">O</span><span class="nl">S</span><span class="nl">É</span><span class="nl sp">&nbsp;</span><span class="nl ini" id="hA">A</span><span class="nl">N</span><span class="nl">T</span><span class="nl">O</span><span class="nl">N</span><span class="nl">I</span><span class="nl">O</span>
      </div>
      <div class="nline">
        <span class="nl ini" id="hC">C</span><span class="nl">R</span><span class="nl">U</span><span class="nl">Z</span><span class="nl sp">&nbsp;</span><span class="nl ini" id="hS">S</span><span class="nl">E</span><span class="nl">G</span><span class="nl">U</span><span class="nl">R</span><span class="nl">A</span>
      </div>
    </div>
 
    <div id="hero-after" aria-live="polite">
      <p class="h-eyebrow">Diseñador Creativo · Sevilla</p>
      <p class="h-role">Visual Branding &nbsp;·&nbsp; Arte 3D &nbsp;·&nbsp; Desarrollo Front-End</p>
      <nav class="h-cta">
        <a href="#projects" class="btn bp">Ver proyectos</a>
        <a href="#contact"  class="btn bo">Contactar</a>
      </nav>
    </div>
 
    <div id="scroll-hint" aria-hidden="true">
      <div class="s-line"></div>
      <span class="s-txt">Scroll</span>
    </div>
  </main>
</div>
 
<script>
(function () {
 
  /* ── Cursor (desktop) ── */
  const cur  = document.getElementById('cur');
  const curR = document.getElementById('curR');
  if (cur) {
    let mx=0,my=0,rx=0,ry=0;
    document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
    (function tick(){
      cur.style.transform  = `translate(${mx-4.5}px,${my-4.5}px)`;
      rx+=(mx-rx)*0.13; ry+=(my-ry)*0.13;
      curR.style.transform = `translate(${rx-15}px,${ry-15}px)`;
      requestAnimationFrame(tick);
    })();
  }
 
  /* ── Elementos ── */
  const hero    = document.getElementById('hero');
  const wrap    = document.getElementById('hero-wrap');
  const stage   = document.getElementById('name-stage');
  const after   = document.getElementById('hero-after');
  const hint    = document.getElementById('scroll-hint');
  const nonInit = stage.querySelectorAll('.nl:not(.ini):not(.sp)');
  const srcs    = { J:'hJ', A:'hA', C:'hC', S:'hS' };
  Object.keys(srcs).forEach(k => { srcs[k] = document.getElementById(srcs[k]); });
 
  /* ── Helpers ── */
  const clamp  = (v,a=0,b=1) => Math.min(b, Math.max(a, v));
  const lerp   = (a,b,t) => a + (b-a)*t;
  const ease   = t => t<0.5 ? 2*t*t : -1+(4-2*t)*t;
  const pRange = (p,a,b) => ease(clamp((p-a)/(b-a)));
 
  function snap(el) {
    const er = el.getBoundingClientRect();
    const hr = hero.getBoundingClientRect();
    return { l: er.left-hr.left, t: er.top-hr.top, fs: parseFloat(getComputedStyle(el).fontSize) };
  }
 
  /* ── Calcular targets: JACS horizontal, letras muy juntas ── */
  function calcTargets() {
    const W  = hero.offsetWidth, H = hero.offsetHeight;
    const cx = W / 2, cy = H * 0.40;
 
    /* Tamaño final — escala con viewport */
    const fs = clamp(W * 0.205, 60, 240);
 
    /* Ratios de ancho real para BigDeal */
    const rW  = { J:0.57, A:0.68, C:0.63, S:0.65 };
    /* Gap muy ajustado — prácticamente kerning de tipografía */
    const gap = fs * 0.042;
 
    const order = ['J','A','C','S'];
    const totalW = order.reduce((s,k) => s + fs*rW[k], 0) + gap * 3;
    let cur = cx - totalW / 2;
 
    const tgts = {};
    order.forEach(k => {
      tgts[k] = { l: cur, t: cy - fs*0.5, fs };
      cur += fs*rW[k] + gap;
    });
    return tgts;
  }
 
  /* ── Estado compartido ── */
  let flyEls   = {};
  let snaps    = {};
  let targets  = {};
  let ready    = false;
 
  /* Inicializar: mostrar stage un frame, medir, crear fly-elements ── */
  function init() {
    stage.style.opacity = '1';
 
    requestAnimationFrame(() => requestAnimationFrame(() => {
      Object.keys(srcs).forEach(k => { snaps[k] = snap(srcs[k]); });
      targets = calcTargets();
      stage.style.opacity = '0';
 
      const order = ['J','A','C','S'];
      order.forEach(k => {
        const s   = snaps[k];
        const fly = document.createElement('div');
        fly.className    = 'fly';
        fly.textContent  = k;
        fly.style.cssText = `left:${s.l}px;top:${s.t}px;font-size:${s.fs}px;color:#ffffff;opacity:0;`;
        hero.appendChild(fly);
        flyEls[k] = fly;
      });
 
      ready = true;
      applyProgress(0);
 
      if (isMobile) {
        window.addEventListener('scroll', onScroll, { passive: true });
      } else {
        runTimed();
      }
    }));
  }
 
  /* ── Aplicar estado según progreso 0→1 ── */
  function applyProgress(p) {
    if (!ready) return;
 
    /* F1: nombre aparece */
    const p1 = pRange(p, 0, 0.10);
    stage.style.opacity = p1.toString();
    Object.keys(srcs).forEach(k => { flyEls[k].style.opacity = p1 > 0.01 ? '1' : '0'; });
 
    /* F1b: posición inicial de flies = snaps (siguen al nombre) */
    if (p < 0.38) {
      Object.keys(srcs).forEach(k => {
        const s = snaps[k];
        flyEls[k].style.left     = s.l + 'px';
        flyEls[k].style.top      = s.t + 'px';
        flyEls[k].style.fontSize = s.fs + 'px';
      });
    }
 
    /* F2: no-iniciales se desvanecen */
    const p2 = pRange(p, 0.12, 0.42);
    nonInit.forEach(el => { el.style.opacity = (1 - p2).toString(); });
 
    /* F2b: ocultar stage cuando las flies toman el relevo */
    if (p > 0.38) stage.style.opacity = '0';
 
    /* F3: vuelan a JACS */
    const p3 = pRange(p, 0.40, 0.78);
    Object.keys(srcs).forEach(k => {
      const s = snaps[k], t = targets[k];
      flyEls[k].style.left     = lerp(s.l, t.l, p3) + 'px';
      flyEls[k].style.top      = lerp(s.t, t.t, p3) + 'px';
      flyEls[k].style.fontSize = lerp(s.fs, t.fs, p3) + 'px';
    });
 
    /* F4: tagline y CTAs */
    const p4 = pRange(p, 0.80, 1.0);
    after.style.opacity   = p4.toString();
    after.style.transform = `translateY(${lerp(14, 0, p4)}px)`;
 
    /* Scroll hint: aparece cuando animación completa */
    hint.style.opacity = p4 > 0.9 ? '0.5' : '0';
  }
 
  /* ── MOBILE: scroll driven ── */
  const isMobile = window.matchMedia('(max-width: 768px)').matches || 'ontouchstart' in window;
 
  function onScroll() {
    const maxScroll = wrap.offsetHeight - window.innerHeight;
    const p = clamp(window.scrollY / maxScroll);
    applyProgress(p);
  }
 
  /* ── DESKTOP: time driven ── */
  function runTimed() {
    const steps = [
      [300,  0.0],
      [600,  0.08],
      [1800, 0.14],
      [2600, 0.42],
      [2700, 0.44],
      [3000, 0.60],
      [3800, 0.78],
      [4300, 0.88],
      [5000, 1.0],
    ];
    steps.forEach(([ms, p]) => {
      setTimeout(() => applyProgress(p), ms);
    });
    /* Tween suave entre steps */
    let startT = null, fromP = 0, toP = 0, stepIdx = 0;
    function tweenTick(ts) {
      if (!startT) startT = ts;
      const elapsed = ts - startT;
      const [ms, p] = steps[stepIdx] || [9999, 1];
      if (elapsed >= ms && stepIdx < steps.length - 1) {
        fromP = steps[stepIdx][1];
        stepIdx++;
        toP = steps[stepIdx][1];
        startT = ts;
      }
      const localP = clamp(elapsed / Math.max(1, (steps[stepIdx]||steps[steps.length-1])[0] - (steps[stepIdx-1]||[0])[0]));
      applyProgress(lerp(fromP, toP, ease(localP)));
      requestAnimationFrame(tweenTick);
    }
    requestAnimationFrame(tweenTick);
  }
 
  /* ── Arrancar ── */
  init();
 
  /* Recalcular si cambia el tamaño */
  window.addEventListener('resize', () => {
    Object.keys(srcs).forEach(k => { snaps[k] = snap(srcs[k]); });
    targets = calcTargets();
  });
 
})();
</script>
</body>
</html>
