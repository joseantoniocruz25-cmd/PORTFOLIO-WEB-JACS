<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartelería — JACS Portfolio</title>
  <meta name="description" content="Galería de cartelería y contenidos de redes sociales. Piezas para Hoy010, Al Alba Chill, Silvio, Real Deportivo Chicharrón y otros clientes.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --clr-bg:      #0F2038;
      --clr-bg-2:    #162F4F;
      --clr-surface: #1C3A5C;
      --clr-text:    #E4DDD0;
      --clr-accent:  #40759C;
      --clr-muted:   rgba(228,221,208,0.40);
      --clr-border:  rgba(228,221,208,0.10);
      --font:        'Raleway', sans-serif;
      --gap:         clamp(3px, 0.4vw, 5px);
      --card-radius: 6px;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 16px; scroll-behavior: smooth; }
    body { background: var(--clr-bg); color: var(--clr-text); font-family: var(--font); overflow-x: hidden; }

    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
    .skip-link {
      position: fixed; top: -100%; left: 1rem; z-index: 9999;
      background: var(--clr-accent); color: var(--clr-bg);
      font-size: .85rem; font-weight: 900; letter-spacing: .05em;
      text-decoration: none; text-transform: uppercase;
      padding: .6rem 1.2rem; transition: top .2s ease;
    }
    .skip-link:focus { top: 1rem; }
    :focus-visible { outline: 2px solid var(--clr-accent); outline-offset: 3px; border-radius: 3px; }

    @view-transition { navigation: auto; }
    ::view-transition-old(root),
    ::view-transition-new(root) { animation-duration: .5s; animation-timing-function: cubic-bezier(.16,1,.3,1); }


    /* ════════════════════════════════════════
       NAV
    ════════════════════════════════════════ */
    .site-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 3vw;
      background: rgba(15,32,56,.9);
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--clr-border);
    }
    .site-nav__logo {
      font-family: var(--font); font-weight: 900; font-size: 1.1rem;
      letter-spacing: -.01em; color: var(--clr-text);
      text-decoration: none; transition: color .2s ease;
    }
    .site-nav__logo:hover { color: var(--clr-accent); }
    .site-nav__back {
      display: flex; align-items: center; gap: .5rem;
      font-size: .58rem; font-weight: 900; letter-spacing: .35em;
      text-transform: uppercase; color: var(--clr-muted);
      text-decoration: none; transition: color .2s ease;
    }
    .site-nav__back:hover { color: var(--clr-text); }
    .site-nav__back svg {
      width: 14px; height: 14px; fill: none; stroke: currentColor;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
      transition: transform .2s ease;
    }
    .site-nav__back:hover svg { transform: translateX(-3px); }


    /* ════════════════════════════════════════
       HEADER MÍNIMO
       Solo el título de sección, sin más texto.
       Las imágenes hablan por sí solas.
    ════════════════════════════════════════ */
    .page-header {
      padding: calc(56px + clamp(3rem,5vw,5rem)) clamp(1rem,2.5vw,2rem)
               clamp(1.5rem,2.5vw,2rem);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1rem;
    }
    .page-title {
      font-family: var(--font); font-weight: 900;
      font-size: clamp(2rem,6vw,5rem);
      letter-spacing: -.03em; text-transform: uppercase;
      color: var(--clr-text); line-height: .88;
      opacity: 0; transform: translateY(10px);
      animation: slideUp .7s cubic-bezier(.16,1,.3,1) .1s forwards;
    }
    /* Contador total — se rellena por JS */
    .page-count {
      font-family: var(--font); font-weight: 900;
      font-size: clamp(1.8rem,4vw,3.2rem);
      letter-spacing: -.03em; line-height: 1;
      color: var(--clr-border);
      opacity: 0; animation: fadeIn .7s ease .3s forwards;
    }


    /* ════════════════════════════════════════
       GALERÍA — grid principal
       4 columnas base.
       Tamaños de celda:
         (sin clase) → 1×1 cuadrado
         .w2         → 2 cols de ancho
         .w3         → 3 cols de ancho
         .h2         → 2 filas de alto  (story/vertical)
         .w2.h2      → 2×2 (pieza grande)

       Todas las imágenes usan object-fit:cover,
       así que recortan para llenar la celda.
       Sube imágenes en la proporción correcta
       para el tipo de celda que quieras usar.
    ════════════════════════════════════════ */
    .gallery {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: clamp(150px, 18vw, 260px);
      gap: var(--gap);
      padding: 0 var(--gap) var(--gap);
    }

    /* Modificadores de tamaño */
    .w2 { grid-column: span 2; }
    .w3 { grid-column: span 3; }
    .h2 { grid-row:    span 2; }

    /* Celda */
    .cell {
      position: relative;
      overflow: hidden;
      border-radius: var(--card-radius);
      background: var(--clr-surface);
      cursor: zoom-in;
    }
    .cell:focus-visible {
      outline: 2px solid var(--clr-accent);
      outline-offset: 2px;
    }
    .cell img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition:
        transform .55s cubic-bezier(.16,1,.3,1),
        filter .4s ease;
      filter: brightness(.95);
    }
    .cell:hover img,
    .cell:focus-visible img {
      transform: scale(1.045);
      filter: brightness(1);
    }

    /* Efecto de zoom-in suave al entrar en viewport */
    .cell {
      opacity: 0;
      animation: cellReveal .5s ease forwards;
    }
    /* El delay lo asigna JS con style="animation-delay: Xs" */


    /* ════════════════════════════════════════
       LIGHTBOX — simple, sin texto
    ════════════════════════════════════════ */
    .lightbox {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(5,12,24,.97);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity .3s ease;
      backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    }
    .lightbox.open { opacity: 1; pointer-events: all; }

    /* Imagen */
    .lightbox__img {
      max-width: 92vw; max-height: 92vh;
      object-fit: contain; border-radius: 6px;
      transform: scale(.96);
      transition: transform .35s cubic-bezier(.16,1,.3,1), opacity .25s ease;
      display: block;
    }
    .lightbox.open .lightbox__img { transform: scale(1); }
    .lightbox__img.switching { opacity: 0; transform: scale(.95); }

    /* Flechas */
    .lb-nav {
      position: absolute; top: 50%; transform: translateY(-50%);
      width: 48px; height: 48px; border-radius: 50%;
      background: rgba(228,221,208,.07); border: 1px solid var(--clr-border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--clr-text); transition: background .2s ease;
    }
    .lb-nav:hover { background: rgba(64,117,156,.3); }
    .lb-nav svg { width: 20px; height: 20px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .lb-prev { left: 1.2rem; }
    .lb-next { right: 1.2rem; }

    /* Cerrar */
    .lb-close {
      position: absolute; top: 1.2rem; right: 1.2rem;
      width: 42px; height: 42px; border-radius: 50%;
      background: rgba(228,221,208,.08); border: 1px solid var(--clr-border);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--clr-text); transition: background .2s ease;
    }
    .lb-close:hover { background: rgba(228,221,208,.18); }
    .lb-close svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }

    /* Contador discreto */
    .lb-counter {
      position: absolute; bottom: 1.2rem; left: 50%;
      transform: translateX(-50%);
      font-size: .5rem; font-weight: 400;
      letter-spacing: .4em; text-transform: uppercase;
      color: rgba(228,221,208,.35);
    }


    /* ════════════════════════════════════════
       FOOTER mínimo
    ════════════════════════════════════════ */
    .site-footer {
      border-top: 1px solid var(--clr-border);
      padding: 2.5rem 5vw;
      display: flex; align-items: center;
      justify-content: space-between; gap: 1rem;
      flex-wrap: wrap;
    }
    .site-footer__name {
      font-size: .58rem; font-weight: 900;
      letter-spacing: .4em; text-transform: uppercase;
      color: var(--clr-muted);
    }
    .site-footer__copy {
      font-size: .56rem; font-weight: 400;
      letter-spacing: .2em; color: var(--clr-border);
    }


    /* ════════════════════════════════════════
       RESPONSIVE
    ════════════════════════════════════════ */
    @media (max-width: 860px) {
      .gallery {
        grid-template-columns: repeat(3, 1fr);
        grid-auto-rows: clamp(130px, 22vw, 210px);
      }
      .w3 { grid-column: span 3; }
      .w2 { grid-column: span 2; }
    }

    @media (max-width: 540px) {
      .site-nav { padding: 1rem 4vw; }
      .site-nav__back span { display: none; }
      .gallery {
        grid-template-columns: repeat(2, 1fr);
        grid-auto-rows: clamp(120px, 35vw, 200px);
      }
      /* En móvil todo se comprime a máximo 2 cols */
      .w3 { grid-column: span 2; }
      .w2 { grid-column: span 2; }
      .h2 { grid-row: span 2; }
      .lb-prev { left: .5rem; }
      .lb-next { right: .5rem; }
    }

    @media (max-width: 380px) {
      .gallery {
        grid-template-columns: repeat(2, 1fr);
        grid-auto-rows: clamp(100px, 38vw, 160px);
      }
    }


    /* ════════════════════════════════════════
       KEYFRAMES
    ════════════════════════════════════════ */
    @keyframes slideUp   { to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn    { to { opacity: 1; } }
    @keyframes cellReveal {
      from { opacity: 0; transform: scale(.97); }
      to   { opacity: 1; transform: scale(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .01ms !important; animation-delay: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>
</head>

  <script>
    /* ── Año ── */
    const yr = new Date().getFullYear();
    const yrEl = document.getElementById('year');
    if (yrEl) { yrEl.textContent = yr; yrEl.setAttribute('datetime', yr); }

    /* ── Reveal escalonado de celdas ── */
    const cells = [...document.querySelectorAll('.cell')];
    cells.forEach((cell, i) => {
      cell.style.animationDelay = `${Math.min(i * 0.04, 1.2)}s`;
    });

    /* ── Contador ── */
    const countEl = document.getElementById('pageCount');
    if (countEl) {
      countEl.textContent = String(cells.length).padStart(2, '0');
      countEl.setAttribute('aria-label', `${cells.length} piezas`);
    }

    /* ── Lightbox ── */
    const lightbox  = document.getElementById('lightbox');
    const lbImg     = document.getElementById('lbImg');
    const lbCounter = document.getElementById('lbCounter');
    const imgs      = cells.map(c => c.querySelector('img'));
    let current   = 0;
    let triggerEl = null;

    function updateLb() {
      const img = imgs[current];
      lbImg.src = img.src;
      lbImg.alt = img.alt;
      lbCounter.textContent = `${current + 1} / ${imgs.length}`;
    }

    function goTo(idx, anim = true) {
      current = (idx + imgs.length) % imgs.length;
      if (anim) {
        lbImg.classList.add('switching');
        setTimeout(() => { updateLb(); lbImg.classList.remove('switching'); }, 200);
      } else {
        updateLb();
      }
    }

    function openLb(idx) {
      goTo(idx, false);
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
      document.getElementById('lbClose').focus();
    }

    function closeLb() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
      if (triggerEl) { triggerEl.focus(); triggerEl = null; }
    }

    cells.forEach((cell, i) => {
      cell.addEventListener('click', () => { triggerEl = cell; openLb(i); });
      cell.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault(); triggerEl = cell; openLb(i);
        }
      });
    });

    document.getElementById('lbClose').addEventListener('click', closeLb);
    document.getElementById('lbPrev').addEventListener('click', () => goTo(current - 1));
    document.getElementById('lbNext').addEventListener('click', () => goTo(current + 1));

    document.addEventListener('keydown', e => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape')     closeLb();
      if (e.key === 'ArrowLeft')  goTo(current - 1);
      if (e.key === 'ArrowRight') goTo(current + 1);
    });
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLb(); });

    /* Swipe táctil */
    let tX = 0;
    lightbox.addEventListener('touchstart', e => { tX = e.touches[0].clientX; }, { passive: true });
    lightbox.addEventListener('touchend', e => {
      const d = tX - e.changedTouches[0].clientX;
      if (Math.abs(d) > 50) goTo(d > 0 ? current + 1 : current - 1);
    });

    /* Focus trap */
    const FOCUSABLE = 'button:not([disabled])';
    lightbox.addEventListener('keydown', e => {
      if (e.key !== 'Tab') return;
      const nodes = [...lightbox.querySelectorAll(FOCUSABLE)];
      const first = nodes[0], last = nodes[nodes.length - 1];
      if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
      else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
    });
  </script>

</body>
</html>
